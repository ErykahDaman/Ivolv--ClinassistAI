<!DOCTYPE html>
<html lang="en">
<head>
  <title>Patient Login | ClinAssist AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta charset="UTF-8"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: 'DM Sans', sans-serif;
      background-color: #0f172a;
      color: #f1f5f9;
      overflow: hidden;
    }

    /* ── Background ── */
    .bg-canvas {
      position: fixed; inset: 0; z-index: 0;
      background:
              radial-gradient(ellipse at 15% 85%, rgba(29,78,216,0.28) 0%, transparent 50%),
              radial-gradient(ellipse at 85% 15%, rgba(56,189,248,0.06) 0%, transparent 40%),
              linear-gradient(160deg, #060e20 0%, #0f172a 40%, #0b1f3a 100%);
    }
    .bg-grid {
      position: fixed; inset: 0; z-index: 0;
      background-image:
              linear-gradient(rgba(29,78,216,0.06) 1px, transparent 1px),
              linear-gradient(90deg, rgba(29,78,216,0.06) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse at center, black 20%, transparent 75%);
    }
    .pulse-lines { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
    .pl { position: absolute; width: 1px; background: linear-gradient(180deg, transparent 0%, rgba(56,189,248,0.15) 50%, transparent 100%); animation: plScroll linear infinite; }
    .pl:nth-child(1) { left: 8%;  height: 28vh; animation-duration: 5s;   animation-delay: 0s; }
    .pl:nth-child(2) { left: 25%; height: 20vh; animation-duration: 7s;   animation-delay: 1.2s; }
    .pl:nth-child(3) { left: 50%; height: 35vh; animation-duration: 4.5s; animation-delay: 2.4s; }
    .pl:nth-child(4) { left: 72%; height: 26vh; animation-duration: 6s;   animation-delay: 0.8s; }
    .pl:nth-child(5) { left: 90%; height: 38vh; animation-duration: 5.5s; animation-delay: 3s; }
    @keyframes plScroll {
      0%   { top: -45vh; opacity: 0; }
      15%  { opacity: 1; }
      85%  { opacity: 1; }
      100% { top: 110vh; opacity: 0; }
    }
    .orb {
      position: fixed; border-radius: 50%; filter: blur(90px);
      pointer-events: none; z-index: 0; animation: orbFloat ease-in-out infinite;
    }
    .orb-1 { width: 500px; height: 500px; background: rgba(29,78,216,0.14); bottom: -120px; left: -100px; animation-duration: 12s; }
    .orb-2 { width: 280px; height: 280px; background: rgba(56,189,248,0.05); top: -60px; right: -60px; animation-duration: 15s; animation-delay: 4s; }
    @keyframes orbFloat {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-20px) scale(1.03); }
    }

    /* ── Layout ── */
    .page {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.25rem;
    }

    /* ── Card ── */
    .auth-card {
      width: 100%;
      max-width: 420px;
      background: rgba(13,24,45,0.82);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 2.5rem 2.25rem 2rem;
      animation: cardIn 0.65s cubic-bezier(0.22,1,0.36,1) both;
      box-shadow: 0 0 0 1px rgba(56,189,248,0.04) inset, 0 32px 64px rgba(0,0,0,0.45);
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(24px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── Brand ── */
    .brand-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      margin-bottom: 2rem;
      text-decoration: none;
    }
    .brand-mark {
      width: 34px; height: 34px;
      background: linear-gradient(135deg, #1d4ed8, #0b1f3a);
      border-radius: 9px;
      border: 1px solid rgba(56,189,248,0.28);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; flex-shrink: 0;
    }
    .brand-mark img { width: 22px; height: 22px; object-fit: contain; }
    .brand-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem; font-weight: 700;
      color: #fff; letter-spacing: -0.01em;
    }
    .brand-name span { color: #38bdf8; }

    /* ── Header text ── */
    .card-title {
      text-align: center;
      margin-bottom: 0.4rem;
      font-family: 'Playfair Display', serif;
      font-size: 1.55rem; font-weight: 700;
      color: #fff; letter-spacing: -0.02em;
    }
    .card-subtitle {
      text-align: center;
      font-size: 0.83rem; font-weight: 400;
      color: rgba(241,245,249,0.45);
      margin-bottom: 2rem;
      line-height: 1.5;
    }

    /* ── Divider ── */
    .card-divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(56,189,248,0.15), transparent);
      margin-bottom: 1.75rem;
    }

    /* ── Form ── */
    .field {
      margin-bottom: 1rem;
    }
    .field label {
      display: block;
      font-size: 0.73rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: rgba(241,245,249,0.45);
      margin-bottom: 0.45rem;
    }
    .input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }
    .input-wrap svg {
      position: absolute;
      left: 0.9rem;
      width: 16px; height: 16px;
      color: rgba(241,245,249,0.3);
      pointer-events: none;
      flex-shrink: 0;
    }
    .input-wrap input {
      width: 100%;
      padding: 0.78rem 1rem 0.78rem 2.6rem;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      color: #f1f5f9;
      font-size: 0.9rem;
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }
    .input-wrap input::placeholder { color: rgba(241,245,249,0.25); }
    .input-wrap input:focus {
      border-color: rgba(56,189,248,0.45);
      background: rgba(56,189,248,0.05);
    }

    /* Password toggle */
    .pw-toggle {
      position: absolute;
      right: 0.85rem;
      background: none;
      border: none;
      cursor: pointer;
      color: rgba(241,245,249,0.3);
      padding: 0;
      display: flex;
      align-items: center;
      transition: color 0.2s;
    }
    .pw-toggle:hover { color: rgba(56,189,248,0.7); }
    .pw-toggle svg { width: 16px; height: 16px; }

    /* ── Login button ── */
    .btn-login {
      width: 100%;
      margin-top: 1.5rem;
      padding: 0.85rem 1rem;
      background: linear-gradient(135deg, #1d4ed8 0%, #1e40af 100%);
      border: 1px solid rgba(56,189,248,0.22);
      border-radius: 12px;
      color: #fff;
      font-size: 0.92rem;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      letter-spacing: 0.03em;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
    }
    .btn-login::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.07), transparent);
      pointer-events: none;
    }
    .btn-login:hover {
      background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
      border-color: rgba(56,189,248,0.4);
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(29,78,216,0.35);
    }
    .btn-login:active { transform: translateY(0); box-shadow: none; }

    /* ── Demo box ── */
    .demo-box {
      margin-top: 1.5rem;
      padding: 0.85rem 1rem;
      background: rgba(56,189,248,0.06);
      border: 1px solid rgba(56,189,248,0.14);
      border-radius: 12px;
      font-size: 0.78rem;
      color: rgba(241,245,249,0.45);
      line-height: 1.7;
    }
    .demo-box .demo-label {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #38bdf8;
      margin-bottom: 0.35rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .demo-box .demo-label::before {
      content: '';
      width: 5px; height: 5px;
      background: #38bdf8;
      border-radius: 50%;
      animation: blink 1.8s ease-in-out infinite;
    }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.25; } }
    .demo-row { display: flex; justify-content: space-between; align-items: center; }
    .demo-row span:last-child { font-family: monospace; color: rgba(241,245,249,0.6); font-size: 0.8rem; }

    /* ── Footer ── */
    .auth-footer {
      margin-top: 1.75rem;
      text-align: center;
      font-size: 0.72rem;
      color: rgba(241,245,249,0.2);
      animation: cardIn 0.65s cubic-bezier(0.22,1,0.36,1) 0.15s both;
    }
    .auth-footer a { color: rgba(56,189,248,0.6); text-decoration: none; transition: color 0.2s; }
    .auth-footer a:hover { color: #38bdf8; }

    /* ── Back link ── */
    .back-link {
      position: fixed;
      top: 1.5rem; left: 1.75rem;
      display: flex; align-items: center; gap: 0.4rem;
      color: rgba(241,245,249,0.35);
      font-size: 0.8rem; font-weight: 500;
      text-decoration: none;
      transition: color 0.2s;
      z-index: 10;
      animation: fadeIn 0.5s ease 0.3s both;
    }
    .back-link:hover { color: #38bdf8; }
    .back-link svg { width: 14px; height: 14px; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    @media (max-width: 480px) {
      .auth-card { padding: 2rem 1.5rem 1.75rem; border-radius: 20px; }
      .back-link { top: 1rem; left: 1rem; }
    }
  </style>
</head>
<body>

<div class="bg-canvas"></div>
<div class="bg-grid"></div>
<div class="pulse-lines">
  <div class="pl"></div><div class="pl"></div><div class="pl"></div>
  <div class="pl"></div><div class="pl"></div>
</div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<a href="index.html" class="back-link">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
  Back to Home
</a>

<div class="page">
  <div class="auth-card">

    <!-- Brand -->
    <a href="index.html" class="brand-row">
      <div class="brand-mark"><img src="AcnEW.jpg" alt="ClinAssist"/></div>
      <span class="brand-name">Clin<span>Assist</span> AI</span>
    </a>

    <!-- Title -->
    <h2 class="card-title">Patient Login</h2>
    <p class="card-subtitle">Sign in to access your health dashboard<br>and medical records.</p>

    <div class="card-divider"></div>

    <!-- Form — IDs and onclick unchanged -->
    <div class="field">
      <label for="patientUsername">Username</label>
      <div class="input-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <input type="text" id="patientUsername" placeholder="Enter your username" autocomplete="username"/>
      </div>
    </div>

    <div class="field">
      <label for="patientPassword">Password</label>
      <div class="input-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <input type="password" id="patientPassword" placeholder="Enter your password" autocomplete="current-password"/>
        <button class="pw-toggle" type="button" id="pwToggle" aria-label="Toggle password visibility">
          <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>

    <!-- Login button — onclick unchanged -->
    <button class="btn-login" onclick="patientLogin()">Sign In</button>

    <!-- Demo credentials -->
    <div class="demo-box">
      <div class="demo-label">Demo credentials</div>
      <div class="demo-row">
        <span>Username</span>
        <span>john123</span>
      </div>
      <div class="demo-row">
        <span>Password</span>
        <span>patient123</span>
      </div>
    </div>

  </div>

  <p class="auth-footer">
    By signing in you agree to our <a href="#">Terms of Service</a> &amp; <a href="#">Privacy Policy</a>
  </p>
</div>

<!-- Password show/hide toggle (UI only — no Firebase changes) -->
<script>
  (function () {
    const toggle = document.getElementById('pwToggle');
    const input  = document.getElementById('patientPassword');
    const icon   = document.getElementById('eyeIcon');

    const eyeOpen   = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
    const eyeClosed = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';

    toggle.addEventListener('click', function () {
      const shown = input.type === 'text';
      input.type  = shown ? 'password' : 'text';
      icon.innerHTML = shown ? eyeOpen : eyeClosed;
    });
  })();
</script>

<!-- Your existing Firebase script — unchanged -->
<script src="script.js"></script>

</body>
</html>
